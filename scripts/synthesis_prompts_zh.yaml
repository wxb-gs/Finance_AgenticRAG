# 多跳 QA 合成 Prompt（中文版）
# 基于 synthesis_prompts.yaml 翻译，适配中文金融文档场景

gen_qa_prompt: |
  你是一个信息抽取和问题生成系统。

  # 任务：
  给定一份文档，提取一组**原子化、可验证的事实**，并将每个事实转化为**问答对**，其中：
  - **问题**聚焦于文档中一个具体、可检索的细节。
  - **答案**简洁、准确，直接来源于文档。
  - 每份文档最多生成 **{gen_qa_num} 个问答对**。优先选择最具体、独特、可验证的事实。
  - 只生成需要查阅文档才能回答的问题——避免常识性或琐碎的事实。

  # 问答生成规则

  1. 原子性
  - 每个问答必须基于单一不可分割的事实（不含并列）。
    ✖ "A增长且B下降" → 必须拆分为两个问题。

  2. 可验证性
  - 答案必须包含至少一项：
    - ✓ 数值（如 59.0%）
    - ✓ 时间或日期（如 2025/04/28）
    - ✓ 唯一的名称/实体（如 张晓明）
  - ✖ 拒绝模糊表述："业绩有所改善"

  3. 时间明确性
  - 包含时间敏感信息时，必须明确标注时间范围
  - 示例：
    ✓ "2025年上半年营业收入同比增长3.0%"
    ✖ "近期营业收入增长3.0%"

  4. 相关性与精确性
  - 避免抽象问题，聚焦于可量化、可数据化的细节。

  5. 答案唯一性
  - 问题必须**足够具体**，使得文档中只有**唯一答案**。
  - ✖ 避免指向不明确、可能有多个正确答案的问题。
    - ✖ "该公司获得了哪些荣誉？"（如果文档中列出了多项）
    - ✓ "该公司在2024年获得的省级荣誉是什么？"（如果只有一个）

  6. 推理偏好
  - 优先生成涉及因果关系、时间序列、条件逻辑或实体关系的问题，而非简单查表。
  - ✓ "哪个子公司对营业收入增长的贡献最大？"
  - ✓ "2025年上半年净利润下降的主要原因是什么？"
  - ✓ "为本公司出具审计意见的审计机构是哪家？"
  - ✖ "应付账款的期末余额是多少？"（简单查表）
  - ✖ "营业总收入是多少？"（单一数字提取）

  # 输出格式：
  JSON 数组，每个元素包含：
  - `question`: 一个具体的、可回答的问题。
  - `answer`: 来自文档的事实性答案。

  # 示例

  ```json
  [
    {{
      "question": "2025年上半年归属于上市公司股东的净利润是多少？",
      "answer": "20,066.24万元"
    }},
    {{
      "question": "报告期内新开门店数量是多少家？",
      "answer": "15家"
    }},
    {{
      "question": "公司的董事会秘书是谁？",
      "answer": "张晓明"
    }}
  ]
  ```

  以下是需要处理的文档内容：
  {input_doc}

refine_prompt: |
  你是一个AI助手，负责清洗和提取问答对中的简洁答案。

  ## 输入：
  给定一个**问题**及其对应的**原始答案**。你的任务是提取最精确、最简洁的信息来直接回答问题。

  ## 处理规则：
  1. 只提取问题所要求的**确切信息**。
  2. 如果存在原始序号或顺序，保持不变。
  3. **不要**遗漏关键信息。
  4. **绝不**添加或推断原始答案中未明确说明的信息。
  5. 严格遵循格式规范：
    - 百分比：使用 `8%` 格式（而非"百分之八"）
    - 金额：使用 `1,000元` 或 `1,000万元` 格式
    - 日期：使用 `YYYY-MM-DD` 格式
    - 单位：包含单位（如 `5千克`、`10厘米`）
  6. 对于包含多个部分或比较性质的答案，应包含多个核心部分和比较陈述。

  ## 输出格式（JSON）：
  {{
    "question": "<原始问题>",
    "original_answer": "<原始答案>",
    "refined_answer": "<清洗后的简洁答案>"
  }}

  ## 示例：
  输入：
  问题：2025年上半年营业收入同比增长了多少？
  原始答案：2025年上半年公司实现营业收入35.8亿元，同比增长12.5%。

  输出：
  {{
    "question": "2025年上半年营业收入同比增长了多少？",
    "original_answer": "2025年上半年公司实现营业收入35.8亿元，同比增长12.5%。",
    "refined_answer": "12.5%"
  }}

  以下是需要处理的数据：
  问题：{question}
  原始答案：{original_answer}

merge_qa_prompt_morehop: |
  你是构建基于文档事实的多跳问题的专家。

  ## 任务
  给定多个问题-答案-文档三元组，生成 **0 到 {max_num}** 个多跳问题，这些问题需要结合**最近的前序跳**（即 Previous_Hops 的最后一个元素）和 New_pair 进行推理。Previous_Hops 严格作为支撑上下文：可用于验证实体/约束，且必须被保留（不可删除、弱化或矛盾）。
  只有在逻辑有效、无歧义且有充分文档支撑时才生成多跳问题。如有任何不确定或弱关联，返回空JSON列表。

  ## 输入格式
  Previous_Hops:
    类型: "对象列表（按时间从旧到新排列）"
    每个元素:
      - Hop_number
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串
  New_pair:
    类型: 对象（待附加到推理链的候选QA+文档）
    字段:
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串

  ## 输出格式
  返回最多 {max_num} 个对象的 JSON 列表。每个对象格式为：
  {{
    "type": "inference" | "comparison",
    "final_question": "...",
    "final_answer": "..."
  }}

  如果无法创建高质量的多跳问题：返回空 JSON 列表 []

  ## 类型说明
  - inference（推理型）：
    最终问题串联信息，使得回答需要(1)最后一个前序跳的事实和(2)New_pair的事实。推理型的 final_answer 必须等于 New_pair 的 Answer。
  - comparison（比较型）：
    最终问题比较一个共同的可量化维度（如日期、数值、规模）。两个比较值必须在文档中有明确支撑。答案应为被比较实体之一。

  ## 规则
  - 1. 将 Previous_Hops 作为支撑上下文。不得删除、弱化或矛盾 Previous_Hops 中任何问题/答案/文档中的事实。
  - 2. 最终问题必须由（最近的 Previous_Hop）+（New_pair）生成。不得删除或弱化 Previous_Hops 问题中的重要信息。
  - 3. 不得泄露中间答案（最终问题中不得出现任何 Previous_Hop 的答案）。
  - 4. 不要简单重述 New_pair 的问题。最终问题必须依赖所有问答-文档对才能回答。
  - 5. 确保有**充分且准确**的证据来得到答案。
  - 6. 跨文档链接实体时，必须从文档内容（而非仅问题文本）中验证它们确实指向同一个现实实体。
  - 7. 比较型只比较同一维度的事实（如日期对日期、金额对金额），不比较无关属性。
  - 8. 不要创建仅独立陈述多个事实、缺乏推理链接的问题。
  - 9. 优先保证精确性和事实依据。如果逻辑关联弱、模糊或推测性的，直接拒绝（返回 []）。
  - 10. 只输出最终 JSON 列表。不要包含思维过程、解释或任何额外文本。

  ## 检查清单
  - [ ] 所有文档描述的事实是否可以逻辑连接？
  - [ ] 比较型：两个事实是否来自同一可量化维度？
  - [ ] 推理型：推理链是否正确导向 New_pair 的 Answer？
  - [ ] 最终问题是否真正需要所有问答-文档对才能回答？
  - [ ] 所有中间答案是否已隐藏？
  - [ ] 链接的实体是否在两份文档中被确认为同一实体？
  - [ ] 是否有充分且准确的证据来得到答案？

  以下是需要处理的数据：
  {Data}

  New_pair:
  Question: {New_question}
  Answer: {New_answer}
  Doc: {New_document}
  只输出最终 JSON 对象，不要解释推理过程。

merge_qa_prompt_morehop_comparison: |
  你是构建基于文档事实的多跳问题的专家。

  ## 任务
  给定多个问题-答案-文档三元组，生成 **0 到 {max_num}** 个多跳问题，这些问题需要结合**最近的前序跳**（即 Previous_Hops 的最后一个元素）和 New_pair 进行推理。Previous_Hops 严格作为支撑上下文。
  只有在逻辑有效、无歧义且有充分文档支撑时才生成多跳问题。如有任何不确定或弱关联，返回空JSON列表。

  ## 输入格式
  Previous_Hops:
    类型: "对象列表（按时间从旧到新排列）"
    每个元素:
      - Hop_number
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串
  New_pair:
    类型: 对象（待附加到推理链的候选QA+文档）
    字段:
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串

  ## 输出格式
  返回最多 {max_num} 个对象的 JSON 列表。每个对象格式为：
  {{
    "type": "inference" | "comparison",
    "final_question": "...",
    "final_answer": "..."
  }}

  如果无法创建高质量的多跳问题：返回空 JSON 列表 []

  ## 类型说明
  - inference（推理型）：
    最终问题串联信息，使得回答需要(1)最后一个前序跳的事实和(2)New_pair的事实。推理型的 final_answer 必须等于 New_pair 的 Answer。
  - comparison（比较型）：
    最终问题比较一个共同的可量化维度（如日期、数值、规模）。两个比较值必须在文档中有明确支撑。答案应为被比较实体之一或"是"/"否"。

  ## 规则
  - 1. 将 Previous_Hops 作为支撑上下文。不得删除、弱化或矛盾 Previous_Hops 中任何事实。
  - 2. 最终问题必须由（最近的 Previous_Hop）+（New_pair）生成。不得删除或弱化 Previous_Hops 问题中的重要信息。
  - 3. 不要简单重述 New_pair 的问题。最终问题必须依赖所有问答-文档对才能回答。最终问题必须比所有前序问题更长。
  - 4. 确保有**充分且准确**的证据来得到答案。
  - 5. 跨文档链接实体时，必须从文档内容中验证它们确实指向同一个现实实体。
  - 6. 比较型只比较同一维度的事实（如日期对日期、金额对金额）。比较必须包含两个或更多不同实体，而非单一对象。
  - 7. 构建最终问题时，任何前序跳的答案都不得在最终问题中被直接指名。必须仅通过其在前序问题中的定义性角色或描述来引用。当引用涉及比较时，完整的比较从句（包括两个实体和比较依据）必须完整嵌入以避免歧义。最终问题必须包含"还是"、"和……相比"或"……与……之间"等比较句式。
  - 8. 不要创建仅独立陈述多个事实、缺乏推理链接的问题。
  - 9. 优先保证精确性和事实依据。如果逻辑关联弱、模糊或推测性的，直接拒绝（返回 []）。
  - 10. 只输出最终 JSON 列表。不要包含思维过程、解释或任何额外文本。

  ## 检查清单
  - [ ] 所有文档描述的事实是否可以逻辑连接？
  - [ ] 比较型：两个事实是否来自同一可量化维度？
  - [ ] 推理型：推理链是否正确导向 New_pair 的 Answer？
  - [ ] 最终问题是否真正需要所有问答-文档对才能回答？
  - [ ] 链接的实体是否在两份文档中被确认为同一实体？
  - [ ] 最终问题是否比所有前序问题更长？
  - [ ] 是否有充分且准确的证据来得到答案？

  以下是需要处理的数据：
  {Data}

  New_pair:
  Question: {New_question}
  Answer: {New_answer}
  Doc: {New_document}
  只输出最终 JSON 对象，不要解释推理过程。

more_optional_answer_prompt: |
  你是**语言变体**和**数据增强**方面的专家。你的任务是为给定的答案生成所有合理的、常见的替代表述、格式和别名。

  **关键准则：**

  1. **等价性：** 每个替代表述必须与原始输入指代*完全相同的实体或信息*。
  2. **变体范围：** 关注：
     * 不同的**格式惯例**（如日期、数字、货币单位）。
     * 常见的**缩写、简称**。
     * 公认的**别名、昵称或简写形式**。
     * 中英文对照表述。
  3. **包含原始：** 始终将原始输入作为列表的第一项。
  4. **格式：** 输出为 JSON 字符串列表。

  输入：{refined_answer}
  请列出最常见且具有相同含义的文本表述，特别是不同格式（如日期、名称、缩写、中英文）。
  最多生成 15 个替代表述。只保留最常见和最有区分度的变体。
  不要包含琐碎的变体（如添加/删除空格、标点或括号）。
  以 JSON 字符串列表回复，不要解释。

inference_check_prompt: |
  你是一个多跳QA验证系统。

  ## 任务
  给定基于两个问题-答案-文档三元组构建的多跳QA：
  (Question1, Answer1, Doc1) 和 (Question2, Answer2, Doc2)，以及最终多跳QA：
  - Final_question
  - Final_answer
  - 类型: "inference"

  你的工作是**验证最终QA是否逻辑有效**。

  ## 输出格式
  返回 JSON 对象：
  {{
    "valid": "true" | "false",
    "error_type": "bad_linkage" | "entity_false_link" | "trivial_concatenation" | "other",
    "justification": "简短的问题说明"
  }}

  ## 定义与规则
  - "inference": 最终问题需要将QA1和QA2组合成推理链。final_answer 必须与 Answer2 完全匹配。中间答案不应出现在 final_question 中。
  - "bad_linkage"（弱关联）: 两个QA-文档对包含表面相似但逻辑断开的无关事实。
  - "entity_false_link"（实体误连）: 仅因不同实体拥有相同或高度相似的名称，而在两个事实或文档之间建立了虚假的联系。
  - "trivial_concatenation"（琐碎拼接）: 最终问题仅通过将两个独立事实拼接成一个句子，缺乏逻辑推理。
  - "other": 其他错误。

  以下是需要处理的数据：
  Question1: {Question1}
  Answer1: {Answer1}
  Doc1:{Document1}
  Question2: {Question2}
  Answer2: {Answer2}
  Doc2:{Document2}
  Final_question:{Final_question}
  Final_answer:{Final_answer}
  类型:{qa_type}
  只返回上述 JSON 对象，不要包含解释。

comparison_check_prompt: |
  你是一个多跳QA验证系统。

  ## 任务
  给定两个问题-答案-文档三元组：
  (Question1, Answer1, Doc1) 和 (Question2, Answer2, Doc2)，以及最终多跳QA：
  - Final_question
  - Final_answer
  - 类型: "comparison"

  你的工作是**验证最终QA是否逻辑有效**。

  ## 输出格式
  返回 JSON 对象：
  {{
    "valid": "true" | "false",
    "error_type": "forced_pairing" | "lacking_evidence" | "trivial_concatenation" | "other",
    "justification": "简短的问题说明"
  }}

  ## 定义与规则
  - "comparison": 最终问题比较来自QA1和QA2的两个实体的**共同属性/维度**。
  - "forced_pairing"（强制配对）: 两个QA-文档对不共享有意义的可比维度。
  - "lacking_evidence"（证据不足）: 一个或两个比较值在提供的文档中未被明确支撑。
  - "trivial_concatenation"（琐碎拼接）: 最终问题仅拼接两个事实，缺乏逻辑比较。
  - "other": 其他错误。

  以下是需要处理的数据：
  Question1: {Question1}
  Answer1: {Answer1}
  Doc1: {Document1}
  Question2: {Question2}
  Answer2: {Answer2}
  Doc2: {Document2}
  Final_question: {Final_question}
  Final_answer: {Final_answer}
  类型: {qa_type}
  只返回上述 JSON 对象，不要包含解释。

reasoning_prompt: |
  请解决以下问题并返回结果。确保回答尽可能简洁，只关注关键信息，省略冗余细节。
  问题是：
  {problem}

comparison_reasoning_prompt: |
  请解决以下问题并返回结果。
  对于比较类问题，如果你不确定答案，请不要猜测或随机选择。而是返回"我无法回答这个问题。"
  问题是：
  {problem}
  确保回答尽可能简洁，只关注关键信息，省略冗余细节。

singlehop_prompt: |
  以下是包含相关信息的文档，用于帮助回答问题。
  文档：
  {Document}
  问题：
  {Question}
  请使用提供的文档中的信息回答问题。确保回答尽可能简洁，只关注关键信息，省略冗余细节。
  如果你无法回答该问题，请返回"我无法回答这个问题。<无法回答的原因>"。

multihop_inference_prompt_morehop: |
  你是解题专家。现在你需要解决一个多跳推理问题。
  多跳推理问题：需要将多个来源的信息按逻辑链组合才能得出答案的问题。

  ## 以下是一些支撑事实，用于帮助回答问题。
  {Data}
  最终问题: {FinalQuestion}
  请解决这个问题并返回结果。确保回答尽可能简洁，只关注关键信息，省略冗余细节。

multihop_comparison_prompt_morehop: |
  你是解题专家。现在你需要解决一个多跳比较问题。
  多跳比较问题：需要从多个来源检索和比较信息以确定相对事实的问题。

  ## 以下是一些支撑事实，用于帮助回答问题。
  {Data}
  最终问题: {FinalQuestion}
  请解决这个问题并返回结果。确保回答尽可能简洁，只关注关键信息，省略冗余细节。

EssEq_prompt: |
  你是一名专业评估员。评估"其他答案"是否保留了"标准答案"中**与问题相关的所有关键信息**。

  # 评分标准
  - **2 分** → 其他答案与标准答案完全等价。含义相同，即使措辞不同。
  - **1 分** → 其他答案包含标准答案的所有关键信息，但添加了额外的非矛盾信息。
  - **0 分** → 其他答案遗漏了关键信息，或引入了错误/矛盾信息。

  始终根据问题的要求来判断信息是否关键。

  # 输出格式：
  只返回 JSON，不要有额外文本。
  ```json
  {{
    "answer_reason": "评分原因",
    "answer_score": 0/1/2
  }}
  ```
